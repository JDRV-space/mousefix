# MouseFix config
# Copy to ~/.config/mousefix/config.yaml
#
# Button numbers: run `mousefix discover` to see what number each button reports.
# MX Master 4 defaults are pre-filled below.
#
# Actions:
#   "Cmd+Z"          any keyboard shortcut (Cmd, Ctrl, Shift, Opt + key)
#   "MiddleClick"    native middle click
#   "LaserPointer"   laser pointer circle while held
#   "MissionControl" trigger Mission Control
#   "None"           disable the button

# Map macOS button numbers to actions.
# Left-click (0) and right-click (1) can't be remapped.
buttons:
  2: "MiddleClick"          # Middle click (scroll wheel press)
  3: "Cmd+Z"                # Back thumb -> Undo
  4: "Cmd+Shift+Z"          # Forward thumb -> Redo
  5: "Cmd+Shift+4"           # Top button -> Screenshot
  6: "Cmd+Space"             # Third thumb -> Spotlight
  7: "LaserPointer"          # Below scroll wheel -> Laser pointer (hold)

# Gesture: hold a button and swipe the mouse in a direction.
# Set button to -1 to disable gestures entirely.
# When enabled, the gesture button's direct action (above) is replaced by tap/hold behavior.
gesture:
  button: 6                  # Which button triggers gestures (third thumb)
  click: "Cmd+Tab"           # Tap -> App Switcher
  hold_left: "Ctrl+Right"   # Hold + swipe left -> Space right
  hold_right: "Ctrl+Left"   # Hold + swipe right -> Space left
  hold_up: "MissionControl"  # Hold + swipe up -> Mission Control
  hold_down: "AppExpose"    # Hold + swipe down -> App Expose

# Horizontal scroll wheel tilt.
tilt_scroll:
  left: "Cmd+["             # Tilt left -> Previous tab
  right: "Cmd+]"            # Tilt right -> Next tab

# Haptic feedback (Logitech HID++ devices only).
# Device name is a substring match, case-insensitive.
# haptic:
#   device: "mx master"
